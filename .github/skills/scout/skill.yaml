name: scout
description: >
  Explore and analyze a Python codebase — scan repo structure,
  build dependency graphs, detect architecture hotspots, and generate
  Mermaid diagrams. Use when the user asks to explore, map, analyze,
  or document a Python project's architecture.

version: "1.0.0"

tools:
  - name: scan_repo
    description: Discover Python files and generate structured previews.
    command: python tools/scan_repo.py
    args:
      - name: --path
        description: Root directory to scan
        default: "."
      - name: --max-preview-lines
        description: Number of preview lines per file
        default: 50
    output: json

  - name: analyze_python_file
    description: AST-based analysis of a single Python file (classes, functions, imports, calls).
    command: python tools/analyze_python_file.py
    args:
      - name: filepath
        description: Path to the Python file to analyze
        required: true
    output: json

  - name: build_dependency_graph
    description: Build import-based dependency edges across a Python repository.
    command: python tools/build_dependency_graph.py
    args:
      - name: --path
        description: Root directory to scan
        default: "."
    output: json

  - name: detect_hotspots
    description: Identify high-complexity modules via LOC, function count, imports, fan-in, fan-out.
    command: python tools/detect_hotspots.py
    args:
      - name: --path
        description: Root directory to scan
        default: "."
      - name: --loc-threshold
        description: Lines of code threshold
        default: 500
      - name: --func-threshold
        description: Function count threshold
        default: 20
      - name: --import-threshold
        description: Import count threshold
        default: 15
      - name: --fan-in-threshold
        description: Fan-in threshold
        default: 5
      - name: --fan-out-threshold
        description: Fan-out threshold
        default: 8
    output: json

instructions: |
  When using the scout skill, follow this workflow:

  1. Run scan_repo to discover all Python files.
  2. Generate a one-line summary for each discovered file.
  3. Run build_dependency_graph to map import relationships.
  4. Generate a Mermaid architecture diagram (graph TD) from edges.
  5. Run detect_hotspots to identify complex modules.
  6. Present a hotspot report to the user.
  7. Ask the user which file they want to deep-analyze.
  8. Run analyze_python_file on the selected file.
  9. Generate a Mermaid class diagram (classDiagram).
  10. Generate a Mermaid call graph (flowchart TD).
  11. Compile all findings into an ARCHITECTURE.md document.
  12. Ask the user before overwriting any existing ARCHITECTURE.md.
